name: Release
on:
  push:
    tags: ["*"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "18.x"
      - run: npm install
      - run: npm run build
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" 2>/dev/null && echo "Release already exists, skipping." || \
          gh release create "$tag" main.js manifest.json styles.css LICENSE \
            --title "$tag" \
            --notes "Release $tag"
